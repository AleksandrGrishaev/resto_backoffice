<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1976D2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kitchen POS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Kitchen POS" />
    <meta name="msapplication-TileColor" content="#1976D2" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- App Description -->
    <meta name="description" content="Kitchen App - Restaurant POS System" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <title>Kitchen POS</title>

    <!-- DEBUG: Eruda mobile console (remove after debugging) -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init()</script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Register Service Worker for PWA with update detection
      if ('serviceWorker' in navigator) {
        var swRefreshing = false

        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            console.log('[SW] Registered, scope:', reg.scope)

            // Check for updates every 5 minutes
            setInterval(function() { reg.update().catch(function(){}) }, 5 * 60 * 1000)

            // Also check on page focus (user returns to PWA)
            document.addEventListener('visibilitychange', function() {
              if (document.visibilityState === 'visible') reg.update().catch(function(){})
            })
          }).catch(function(err) {
            console.warn('[SW] Registration failed:', err)
          })
        })

        // When a new SW takes control, reload once to get new code
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (swRefreshing) return
          swRefreshing = true
          console.log('[SW] New version activated, reloading...')
          window.location.reload()
        })
      }
    </script>
  </body>
</html>
